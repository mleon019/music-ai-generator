<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Historial de composiciones</title>
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body class="page-history">
    <header class="topbar">
      <a class="brand" href="/index.html">Generador de partituras con IA</a>
      <nav class="topbar-actions" data-auth-nav></nav>
    </header>

    <main class="page-shell">
      <section class="intro reveal">
        <h1>Hola, <span data-user-name></span></h1>
        <p>Tus partituras guardadas aparecerán aqui. Pulsa en cada partitura para visualizarla.</p>
      </section>

      <section class="panel reveal delay-1">
        <div class="history-header">
          <h2>Partituras guardadas</h2>
          <div class="history-actions">
            <button class="button ghost" type="button" data-delete-all-scores>Borrar historial</button>
            <a class="link" href="/form.html">Generar nueva partitura</a>
          </div>
        </div>
        <p class="status" data-status></p>
        <div class="history-list" data-history-list></div>
      </section>
    </main>

    <div class="modal-overlay" data-delete-modal hidden>
      <div class="modal-panel panel reveal">
        <h2>Eliminar historial</h2>
        <p>¿Estás seguro de que quieres eliminar todas tus partituras? Esta acción no se puede deshacer.</p>
        <div class="form-actions" style="margin-top: 1rem;">
          <button type="button" class="button ghost" data-delete-cancel>Cancelar</button>
          <button type="button" class="button danger" data-delete-confirm>Eliminar todo</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/js/history.js"></script>
  </body>
</html>
