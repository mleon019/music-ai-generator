<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Historial de composiciones</title>
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body class="page-history">
    <header class="topbar">
      <a class="brand" href="/index.html">Generador de partituras con IA</a>
      <nav class="topbar-actions" data-auth-nav></nav>
    </header>

    <main class="page-shell">
      <section class="intro reveal">
        <div class="history-header">
          <div>
            <h1 data-history-title>Historial</h1>
            <p class="history-count" data-history-count></p>
          </div>
          <button class="button ghost" type="button" data-delete-all-scores title="Borrar historial" hidden><i data-lucide="trash-2" class="icon-sm"></i>Borrar historial</button>
        </div>
      </section>

      <div class="history-list" data-history-list></div>
      <p class="status" data-status></p>
    </main>

    <div class="modal-overlay" data-delete-modal hidden>
      <div class="modal-panel panel reveal">
        <div class="modal-header">
          <h2>Borrar historial</h2>
          <button class="icon-btn" type="button" data-delete-close title="Cerrar"><i data-lucide="x" class="icon-sm"></i></button>
        </div>
        <div class="warning-panel">
          <i data-lucide="info" class="warning-icon"></i>
          <p>¿Estás seguro de que quieres eliminar todas tus partituras? Esta acción no se puede deshacer.</p>
        </div>
        <div class="form-actions equal">
          <button type="button" class="button ghost" data-delete-cancel>Cancelar</button>
          <button type="button" class="button danger" data-delete-confirm>Borrar todo</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/js/pages/history.js"></script>
  </body>
</html>
