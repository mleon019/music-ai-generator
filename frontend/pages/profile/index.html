<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Perfil</title>
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body class="page-auth page-profile">
    <header class="topbar">
      <a class="brand" href="/index.html">Generador de partituras con IA</a>
      <nav class="topbar-actions" data-auth-nav></nav>
    </header>

    <main class="page-shell">
      <section class="intro reveal">
        <h1>Mi perfil</h1>
        <p>Modifica tus datos personales cuando sea necesario.</p>
      </section>

      <section class="panel auth-panel profile-panel reveal delay-1">
        <div class="profile-summary">
          <p class="eyebrow">Sesión iniciada como</p>
          <p class="profile-email" data-profile-email></p>
        </div>

        <form class="auth-form" data-profile-form>
          <label class="field">
            Nombre
            <input type="text" name="name" required />
          </label>
          <label class="field">
            Contraseña actual
            <input type="password" name="currentPassword" minlength="6" />
          </label>
          <label class="field">
            Nueva contraseña
            <input type="password" name="newPassword" minlength="6" />
          </label>
          <div class="form-actions profile-actions">
            <button type="submit" class="button primary">Guardar cambios</button>
            <button type="button" class="button ghost danger" data-delete-account>Eliminar cuenta</button>
          </div>
          <p class="status" data-status></p>
        </form>
      </section>
    </main>

    <script type="module" src="/src/js/profile.js"></script>
  </body>
</html>
