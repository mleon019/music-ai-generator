<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear cuenta</title>
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body class="page-auth">
    <header class="topbar">
      <a class="brand" href="/index.html">Generador de partituras con IA</a>
      <nav class="topbar-actions" data-auth-nav></nav>
    </header>

    <main class="page-shell">
      <section class="intro reveal">
        <h1>Crea tu cuenta</h1>
        <p>Registrate para guardar tus creaciones y acceder a tu historial personal.</p>
      </section>

      <section class="panel auth-panel reveal delay-1">
        <form class="auth-form" data-auth-form>
          <label class="field">
            Nombre
            <input type="text" name="name" required />
          </label>
          <label class="field">
            Email
            <input type="email" name="email" required />
          </label>
          <label class="field">
            Contraseña
            <input type="password" name="password" minlength="6" required />
          </label>
          <div class="form-actions">
            <button type="submit" class="button primary">Crear cuenta</button>
          </div>
          <p class="status" data-status></p>
        </form>
      </section>
    </main>

    <script type="module" src="/src/js/register.js"></script>
  </body>
</html>
