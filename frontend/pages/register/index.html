<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear cuenta</title>
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body class="page-auth">
    <header class="topbar">
      <a class="brand" href="/index.html">Generador de partituras con IA</a>
      <nav class="topbar-actions" data-auth-nav></nav>
    </header>

    <main class="page-shell">
      <section class="intro reveal">
        <a class="back-link" href="/index.html"><i data-lucide="arrow-left" class="icon-sm"></i>Volver</a>
        <h1>Crear cuenta</h1>
        <p>Empieza a crear partituras con inteligencia artificial.</p>
      </section>

      <section class="panel auth-panel reveal delay-1">
        <form class="auth-form" data-auth-form>
          <label class="field">
            NOMBRE DE USUARIO
            <input type="text" name="name" required />
          </label>
          <label class="field">
            CORREO ELECTRÓNICO
            <input type="email" name="email" placeholder="tunombre@example.com" required />
          </label>
          <label class="field">
            CONTRASEÑA
            <input type="password" name="password" minlength="8" required />
          </label>
          <label class="field checkbox-field">
            <input type="checkbox" name="accept-terms" />
            <span>He leído y acepto la <a href="/legal/politica-privacidad">Política de Privacidad</a> y los <a href="/legal/terminos-uso">Términos de Uso</a>.</span>
          </label>
          <div class="form-actions">
            <button type="submit" class="button primary">Crear cuenta</button>
          </div>
          <p class="auth-alt">¿Ya tienes cuenta? <a class="auth-link" href="/login/">Iniciar sesión</a></p>
          <p class="status" data-status></p>
        </form>
      </section>
    </main>

    <script type="module" src="/src/js/pages/register.js"></script>
  </body>
</html>
