<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio de sesión</title>
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body class="page-auth">
    <header class="topbar">
      <a class="brand" href="/index.html">Generador de partituras con IA</a>
      <nav class="topbar-actions" data-auth-nav></nav>
    </header>

    <main class="page-shell">
      <section class="intro reveal">
        <h1>Bienvenido de nuevo</h1>
        <p>Inicia sesión para acceder al registro de partituras guardadas.</p>
      </section>

      <section class="panel auth-panel reveal delay-1">
        <form class="auth-form" data-auth-form>
          <label class="field">
            Email
            <input type="email" name="email" required />
          </label>
          <label class="field">
            Contraseña
            <input type="password" name="password" minlength="6" required />
          </label>
          <div class="form-actions">
            <button type="submit" class="button primary">Iniciar sesión</button>
          </div>
          <p class="auth-alt"><button type="button" class="link link-button" data-forgot-password>¿Olvidaste tu contraseña?</button></p>
          <p class="status" data-status></p>
        </form>
      </section>
    </main>

    <div class="modal-overlay" data-modal hidden>
      <div class="modal-panel panel reveal">
        <h2>Restablecer contraseña</h2>
        <p>Se enviará un enlace a tu correo electrónico para que puedas restablecer tu contraseña.</p>
        <form class="auth-form" data-forgot-form>
          <label class="field">
            Email
            <input type="email" name="email" data-forgot-email required />
          </label>
          <div class="form-actions">
            <button type="button" class="button ghost" data-modal-close>Cancelar</button>
            <button type="submit" class="button primary">Enviar enlace</button>
          </div>
          <p class="status" data-forgot-status></p>
        </form>
      </div>
    </div>

    <script type="module" src="/src/js/login.js"></script>
  </body>
</html>
