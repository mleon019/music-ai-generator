<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio de sesión</title>
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body class="page-auth">
    <header class="topbar">
      <a class="brand" href="/index.html">Generador de partituras con IA</a>
      <nav class="topbar-actions" data-auth-nav></nav>
    </header>

    <main class="page-shell">
      <section class="intro reveal">
        <h1>Inicio de sesión</h1>
        <p>Accede a tu cuenta para continuar.</p>
      </section>

      <section class="panel auth-panel reveal delay-1">
        <h2 class="auth-card-title">Bienvenido de nuevo</h2>
        <p class="auth-card-desc">Accede a tu cuenta para continuar.</p>
        <form class="auth-form" data-auth-form>
          <label class="field">
            CORREO ELECTRÓNICO
            <input type="email" name="email" placeholder="tunombre@example.com" required />
          </label>
          <label class="field">
            CONTRASEÑA
            <input type="password" name="password" minlength="8" required />
          </label>
          <a href="#" class="forgot-link" data-forgot-password>¿Olvidaste tu contraseña?</a>
          <div class="form-actions">
            <button type="submit" class="button primary">Iniciar sesión</button>
          </div>
          <p class="auth-alt">¿No tienes cuenta? <a class="auth-link" href="/register/">Crear cuenta</a></p>
          <p class="status" data-status></p>
        </form>
      </section>
    </main>

    <div class="modal-overlay" data-modal hidden>
      <div class="modal-panel panel reveal">
        <div class="modal-header">
          <h2>Restablecer contraseña</h2>
          <button class="icon-btn" type="button" data-modal-close title="Cerrar"><i data-lucide="x" class="icon-sm"></i></button>
        </div>
        <div class="warning-panel">
          <i data-lucide="mail" class="warning-icon"></i>
          <p>Se enviará un enlace de recuperación a tu correo electrónico.</p>
        </div>
        <form class="auth-form" data-forgot-form>
          <label class="field">
            Email
            <input type="email" name="email" data-forgot-email required />
          </label>
          <div class="form-actions equal">
            <button type="button" class="button ghost" data-modal-cancel>Cancelar</button>
            <button type="submit" class="button primary">Enviar enlace</button>
          </div>
          <p class="status" data-forgot-status data-state="idle"></p>
        </form>
      </div>
    </div>

    <script type="module" src="/src/js/login.js"></script>
  </body>
</html>
