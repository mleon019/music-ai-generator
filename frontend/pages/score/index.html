<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tu partitura</title>
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body class="page-score">
    <header class="topbar">
      <a class="brand" href="/index.html">Generador de partituras con IA</a>
      <nav class="topbar-actions" data-auth-nav></nav>
    </header>

    <main class="page-shell">
      <section class="intro reveal">
        <h1>Tu partitura</h1>
        <p id="score-status" class="status">Contando pulsos...</p>
        <div class="action-row">
          <div class="action-row-left">
            <button id="regenerate-button" class="button ghost" type="button"><i data-lucide="refresh-cw" class="icon-sm"></i>Regenerar partitura</button>
            <a id="back-generator-link" class="button ghost" href="/form.html"><i data-lucide="settings-2" class="icon-sm"></i>Volver a configurar</a>
          </div>
          <div id="export-root" class="action-row-right"></div>
        </div>
      </section>

      <section class="panel score-panel reveal delay-1">
        <div id="score-root"></div>
      </section>
    </main>

    <script type="module" src="/src/js/score.js"></script>
  </body>
</html>
