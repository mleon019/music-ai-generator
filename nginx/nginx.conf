server {
    listen 80;
    server_name mikelleon-gaisep1.eus www.mikelleon-gaisep1.eus;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name mikelleon-gaisep1.eus www.mikelleon-gaisep1.eus;

    ssl_certificate /etc/letsencrypt/live/mikelleon-gaisep1.eus/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mikelleon-gaisep1.eus/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/legal/[^/]+/?$ {
        try_files /legal/index.html =404;
    }

    location / {
        try_files $uri $uri/index.html =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
